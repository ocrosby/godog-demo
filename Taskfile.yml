version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  deps:
    desc: Install required development tools
    cmds:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - go install gotest.tools/gotestsum@latest

  install:
    desc: Install dependencies and tidy modules
    deps: [deps]
    cmds:
      - go mod tidy
      - go mod download

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  test:
    desc: Run tests with gotestsum
    cmds:
      - gotestsum --format testname --junitfile junit.xml -- -v -count=1 ./features/steps

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f godog-demo
      - rm -f junit.xml

  docker-build:
    desc: Build the Docker image
    cmds:
      - docker build -t godog-demo .

  docker-test:
    desc: Build and run tests inside Docker
    deps: [docker-build]
    cmds:
      - docker run --rm godog-demo
